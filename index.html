<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abertura de Chamado</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        main {
            background-color: #ffffff;
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e3c72;
        }

        h3 {
            text-align: center;
            color: #2c5364;
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            color: #203a43;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #2c5364;
            border-radius: 8px;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #1e90ff;
            box-shadow: 0 0 8px rgba(30, 144, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(90deg, #2a5298, #1e90ff);
            transform: scale(1.03);
        }

        #ticket-resultado {
            margin-top: 20px;
            background-color: #e6f2ff;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #1e90ff;
            display: none;
        }

        p {
            margin-bottom: 8px;
            color: #203a43;
        }

        mark {
            background-color: #cce6ff;
            padding: 3px 6px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h2>Abertura de Chamado</h2>

            <label>Nome Completo:</label>
            <input type="text" id="input-nome" placeholder="Digite seu nome">

            <!-- 🔽 SELECT ADICIONADO AQUI -->
            <label>Nível de Urgência:</label>
            <select id="select-urgencia">
                <option value="10">Baixa</option>
                <option value="7">Média</option>
                <option value="2">Alta</option>
            </select>

            <button onclick="gerarTicket()">Gerar Ticket</button>
        </section>

        <section id="ticket-resultado">
            <h3>Ticket Gerado!</h3>
            <p>Cliente: <strong id="out-nome"></strong></p>
            <p>Data de Abertura: <time id="out-data"></time></p>
            <p>Prazo de Resposta: <mark id="out-prazo"></mark></p>
        </section>
    </main>

    <script src="../script.js"></script>
</body>
</html>
